<div class="step-container px-3">
  
  <div class="text-center mb-5">
    <h2 class="fw-bold mb-2 text-custom-primary">Supercharge your account</h2>
    <p class="text-muted fs-5 mx-auto" style="max-width: 600px;">
      Choose the tools you'll use frequently. We will personalize your dashboard based on these selections. You can change this later.
    </p>
  </div>

  <div class="row row-cols-1 row-cols-md-2 g-4">
    
    <div class="col" *ngFor="let feat of features; let i = index">
      
      <div class="feature-card-wrapper h-100" [style.animation-delay]="(i * 0.1) + 's'">
        
        <input 
          type="checkbox" 
          class="btn-check" 
          [id]="'check-' + feat.id" 
          [checked]="isChecked(feat.id)"
          (change)="toggleFeature(feat.id)"
          autocomplete="off">
        
        <label class="btn btn-outline-custom card-fintech w-100 h-100 p-4 text-start" [for]="'check-' + feat.id">
          
          <div class="d-flex justify-content-between align-items-start mb-4">
            
            <div class="icon-box rounded-3 d-flex align-items-center justify-content-center">
              <i class="bi" [ngClass]="feat.iconClass" style="font-size: 3.2rem;"></i>
            </div>

            <div class="check-indicator rounded-circle d-flex align-items-center justify-content-center">
              <i class="bi bi-check-lg check-mark fs-5 text-white"></i>
            </div>

          </div>

          <div class="mt-2">
            <h5 class="fw-bold card-title-text mb-2">{{ feat.title }}</h5>
            <p class="text-muted small mb-0 lh-lg">{{ feat.desc }}</p>
          </div>

        </label>
      </div>

    </div>
    
  </div>
</div>
