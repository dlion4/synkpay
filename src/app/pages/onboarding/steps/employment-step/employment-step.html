<div class="step-container px-3 py-4" [formGroup]="parentForm">

  <!-- Header Section -->
  <div class="text-center mb-5">
    <span class="badge bg-primary-subtle text-custom-primary mb-3 px-3 py-2 rounded-pill fw-semibold tracking-wide">
      STEP 2: VERIFICATION
    </span>
    <h2 class="fw-bold mb-3 text-custom-primary display-6">Source of Funds</h2>
    <p class="text-muted fs-5 mx-auto" style="max-width: 600px;">
      To keep your account secure and comply with regulations, we need to understand your primary source of income.
    </p>
  </div>

  <!-- Part 1: Employment Status Cards -->
  <div class="mb-5">
    <h5 class="fw-bold text-dark mb-4 px-1">What is your current employment status?</h5>
    <div class="row row-cols-1 row-cols-md-2 g-4">

      <div class="col" *ngFor="let status of employmentStatuses; let i = index">
        <!-- Interactive Card Wrapper -->
        <div class="feature-card-wrapper h-100" [style.animation-delay]="(i * 0.1) + 's'">

          <!-- Native Bootstrap hidden RADIO button -->
          <input type="radio" class="btn-check" [id]="'status-' + status.value" formControlName="employment"
            [value]="status.value" autocomplete="off">

          <label
            class="btn btn-outline-custom card-fintech w-100 h-100 p-4 text-start position-relative overflow-hidden"
            [for]="'status-' + status.value">

            <div class="d-flex justify-content-between align-items-start mb-4">
              <!-- Feature Icon Box -->
              <div class="icon-box rounded-3 d-flex align-items-center justify-content-center">
                <!-- We use 3rem or 4rem here to make the icon massive -->
                <i class="bi" [ngClass]="status.iconClass" style="font-size: 3rem;"></i>
              </div>

              <!-- Custom RADIO Indicator -->
              <div class="radio-indicator rounded-circle d-flex align-items-center justify-content-center shadow-sm">
                <div class="radio-dot"></div>
              </div>
            </div>

            <!-- Text Content -->
            <div class="mt-2">
              <h5 class="fw-bold card-title-text mb-2">{{ status.title }}</h5>
              <p class="text-muted small mb-0 lh-lg">{{ status.desc }}</p>
            </div>

          </label>
        </div>
      </div>

    </div>
  </div>

  <hr class="text-muted opacity-25 my-5">

  <!-- Part 2: Income Range Dropdown -->
  <div class="feature-card-wrapper" style="animation-delay: 0.5s;">
    <h5 class="fw-bold text-dark mb-3 px-1">Estimated Annual Income</h5>
    <p class="text-muted small mb-4 px-1">Select the range that best represents your total gross income for the year.
    </p>

    <div class="position-relative">
      <select class="form-select form-control-clarity form-select-lg py-3 fw-medium text-dark shadow-sm"
        formControlName="incomeRange" aria-label="Annual Income Select">
        <option value="" disabled selected>Select an income range...</option>
        <option *ngFor="let range of incomeRanges" [value]="range.value">{{ range.label }}</option>
      </select>

      <!-- Validation Icon (Optional, appears when valid) -->
      <div *ngIf="parentForm.get('incomeRange')?.valid && parentForm.get('incomeRange')?.touched"
        class="position-absolute top-50 end-0 translate-middle-y me-5 text-success">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
          <path
            d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.267.267 0 0 1 .02-.022z" />
        </svg>
      </div>
    </div>
  </div>

</div>
