<div class="glass-card p-8 p-md-12 shadow-lg animate-fade position-relative mesh-bg text-center">
    
    <div class="mb-8 position-relative z-index-1">
        <div class="symbol symbol-70px mb-4">
            <span class="symbol-label bg-light-warning border border-warning border-dashed rounded-circle shadow-sm">
                <i class="fas fa-fingerprint fs-2x text-warning-dark" style="color: #c99c35;"></i>
            </span>
        </div>
        <h1 class="text-dark fw-bolder mb-3 display-6">Recover Access</h1>
        <div class="text-muted fw-semibold fs-6 px-4">
            Enter your details below and we'll send you a secure link to reset your credentials.
        </div>
    </div>

    <div class="bg-light p-1 rounded-pill border border-gray-300 d-inline-flex mb-8 position-relative z-index-1">
        <ul class="nav nav-pills nav-pills-custom m-0">
            <li class="nav-item m-0">
                <a class="nav-link px-6 rounded-pill fw-bolder" [class.active]="recoveryMode === 'email'" (click)="switchMode('email')">
                    <i class="fas fa-envelope me-2"></i> Email
                </a>
            </li>
            <li class="nav-item m-0">
                <a class="nav-link px-6 rounded-pill fw-bolder" [class.active]="recoveryMode === 'phone'" (click)="switchMode('phone')">
                    <i class="fas fa-mobile-alt me-2"></i> SMS / Phone
                </a>
            </li>
        </ul>
    </div>

    <form class="form w-100 position-relative z-index-1 text-start" (ngSubmit)="onSubmit()">
        
        <div *ngIf="recoveryMode === 'email'" class="animate-fade">
            <div class="fv-row mb-6 input-icon-wrapper position-relative">
                <i class="fas fa-at input-icon"></i>
                <input class="form-control form-control-lg bg-light border-0 py-4 ps-12 fw-bold custom-input" 
                       type="email" 
                       placeholder="name@company.com" 
                       [(ngModel)]="email" 
                       name="email" 
                       (keyup)="onEmailType($event)"
                       autocomplete="off" />
                
                <div class="domain-suggestions d-flex gap-2 mt-2 animate-fade" *ngIf="showDomainSuggestions">
                    <span *ngFor="let domain of commonDomains" 
                          class="badge bg-white border border-gray-300 text-dark cursor-pointer hover-gold px-3 py-2 shadow-sm"
                          (click)="appendDomain(domain)">
                        {{ domain }}
                    </span>
                </div>
            </div>
        </div>

        <div *ngIf="recoveryMode === 'phone'" class="animate-fade">
            <div class="fv-row mb-6 input-icon-wrapper">
                <i class="fas fa-phone input-icon"></i>
                <input class="form-control form-control-lg bg-light border-0 py-4 ps-12 fw-bold custom-input" 
                       type="tel" 
                       placeholder="+254 712 345 678" 
                       [(ngModel)]="phone" 
                       name="phone" 
                       autocomplete="off" />
            </div>
        </div>
        
        <div class="d-flex flex-column flex-sm-row gap-3 mt-8">
            <a routerLink="/auth/sign-in" class="btn btn-light bg-white border border-gray-300 py-4 fw-bolder text-dark rounded-pill flex-grow-1 hover-elevate-up text-center">
                Cancel
            </a>
            
            <button type="submit" class="btn btn-gold py-4 rounded-pill fw-bolder shadow-sm flex-grow-1 d-flex justify-content-center align-items-center" 
                    [disabled]="isSubmitting || cooldownTimer > 0">
                <span *ngIf="!isSubmitting && cooldownTimer === 0">Send Reset Link <i class="fas fa-paper-plane ms-2"></i></span>
                <span *ngIf="isSubmitting"><span class="spinner-border spinner-border-sm me-3"></span> Dispatching...</span>
                <span *ngIf="cooldownTimer > 0"><i class="fas fa-clock me-2"></i> Resend in {{cooldownTimer}}s</span>
            </button>
        </div>
    </form>
</div>

<div class="custom-toast shadow-lg" 
     [ngClass]="{'show': toast.show, 'bg-danger': toast.type === 'error', 'bg-success': toast.type === 'success', 'bg-warning': toast.type === 'warning'}">
    <i class="fas fs-3" [ngClass]="toast.icon"></i>
    <div class="d-flex flex-column ms-2">
        <span class="fw-bolder fs-7 text-white">{{ toast.type | uppercase }}</span>
        <span class="fw-semibold text-white opacity-75 fs-8">{{ toast.message }}</span>
    </div>
</div>
