<div class="glass-card p-8 p-md-12 shadow-lg animate-fade position-relative mesh-bg">
    
    <div class="position-absolute top-0 end-0 m-6">
        <span class="badge bg-light-danger border border-danger border-dashed text-danger fw-bolder px-3 py-2 shadow-sm font-monospace fs-7">
            <i class="fas fa-stopwatch me-1"></i> {{ timerDisplay }}
        </span>
    </div>

    <div class="text-center mb-10 position-relative z-index-1 mt-4">
        <div class="symbol symbol-70px mb-4">
            <span class="symbol-label bg-light-primary border border-primary border-dashed rounded-circle shadow-sm">
                <i class="fas fa-key fs-2x text-primary"></i>
            </span>
        </div>
        <h1 class="text-dark fw-bolder mb-3 display-6">Secure Your Vault</h1>
        <div class="text-muted fw-semibold fs-6 px-4">
            Create a master password for your SendMo account.
        </div>
    </div>

    <form class="form w-100 position-relative z-index-1" (ngSubmit)="onSubmit()">
        
        <label class="form-label fs-7 fw-bolder text-dark text-uppercase ls-1">New Master Password</label>
        <div class="fv-row mb-4 position-relative input-icon-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input class="form-control form-control-lg bg-light border-0 py-4 ps-12 pe-12 fw-bold custom-input" 
                   [type]="showNewPass ? 'text' : 'password'" 
                   placeholder="Enter complex password" 
                   [(ngModel)]="credentials.newPassword" 
                   name="newPassword" 
                   (ngModelChange)="evaluatePassword()"
                   autocomplete="off" />
            
            <span class="btn btn-sm btn-icon position-absolute translate-middle-y top-50 end-0 me-2" (click)="togglePass('new')">
                <i class="fas fs-5 transition-300" [ngClass]="showNewPass ? 'fa-eye text-primary' : 'fa-eye-slash text-muted'"></i>
            </span>
        </div>

        <div class="bg-white p-4 rounded-4 border border-gray-300 shadow-sm mb-6">
            <div class="row g-2">
                <div class="col-6">
                    <div class="d-flex align-items-center req-item" [ngClass]="{'req-met': reqs.length}">
                        <i class="fas fs-8 me-2" [ngClass]="reqs.length ? 'fa-check-circle text-success' : 'fa-circle text-muted'"></i>
                        <span class="fs-8 fw-bold">8+ Characters</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="d-flex align-items-center req-item" [ngClass]="{'req-met': reqs.upper}">
                        <i class="fas fs-8 me-2" [ngClass]="reqs.upper ? 'fa-check-circle text-success' : 'fa-circle text-muted'"></i>
                        <span class="fs-8 fw-bold">Uppercase Letter</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="d-flex align-items-center req-item" [ngClass]="{'req-met': reqs.number}">
                        <i class="fas fs-8 me-2" [ngClass]="reqs.number ? 'fa-check-circle text-success' : 'fa-circle text-muted'"></i>
                        <span class="fs-8 fw-bold">Number (0-9)</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="d-flex align-items-center req-item" [ngClass]="{'req-met': reqs.symbol}">
                        <i class="fas fs-8 me-2" [ngClass]="reqs.symbol ? 'fa-check-circle text-success' : 'fa-circle text-muted'"></i>
                        <span class="fs-8 fw-bold">Special Symbol</span>
                    </div>
                </div>
            </div>
            <div class="progress h-4px w-100 bg-light mt-3 rounded-pill">
                <div class="progress-bar transition-300" 
                     [ngClass]="{'bg-danger': score === 1, 'bg-warning': score === 2, 'bg-info': score === 3, 'bg-success': score === 4}"
                     [style.width.%]="score * 25"></div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label fs-7 fw-bolder text-dark text-uppercase ls-1 m-0">Confirm Password</label>
            <span class="badge bg-light-success text-success fw-bold animate-fade" *ngIf="passwordsMatch && credentials.confirmPassword.length > 0">
                <i class="fas fa-check me-1"></i> Matches
            </span>
        </div>
        <div class="fv-row mb-8 position-relative input-icon-wrapper">
            <i class="fas fa-check-double input-icon" [ngClass]="{'text-success': passwordsMatch && credentials.confirmPassword.length > 0}"></i>
            <input class="form-control form-control-lg bg-light border-0 py-4 ps-12 pe-12 fw-bold custom-input" 
                   [ngClass]="{'border-success bg-light-success': passwordsMatch && credentials.confirmPassword.length > 0}"
                   [type]="showConfPass ? 'text' : 'password'" 
                   placeholder="Retype password" 
                   [(ngModel)]="credentials.confirmPassword" 
                   name="confirmPassword" 
                   (ngModelChange)="checkMatch()"
                   (paste)="preventPaste($event)"
                   autocomplete="off" />
            
            <span class="btn btn-sm btn-icon position-absolute translate-middle-y top-50 end-0 me-2" (click)="togglePass('conf')">
                <i class="fas fs-5 transition-300" [ngClass]="showConfPass ? 'fa-eye text-primary' : 'fa-eye-slash text-muted'"></i>
            </span>
        </div>

        <div class="d-grid mb-6">
            <button type="submit" class="btn btn-gold py-4 fs-5 rounded-pill shadow-lg d-flex justify-content-center align-items-center" 
                    [disabled]="isSubmitting || score < 4 || !passwordsMatch">
                <span *ngIf="!isSubmitting">Initialize Vault Key <i class="fas fa-shield-alt ms-2"></i></span>
                <span *ngIf="isSubmitting"><span class="spinner-border spinner-border-sm me-3"></span> Securing Network...</span>
            </button>
        </div>

        <div class="text-center text-muted fw-semibold fs-7">
            Remembered your password? <a routerLink="/auth/sign-in" class="fw-bolder hover-gold transition-300">Return to Login</a>
        </div>
    </form>
</div>

<div class="custom-toast shadow-lg" 
     [ngClass]="{'show': toast.show, 'bg-danger': toast.type === 'error', 'bg-success': toast.type === 'success', 'bg-warning': toast.type === 'warning'}">
    <i class="fas fs-3" [ngClass]="toast.icon"></i>
    <div class="d-flex flex-column ms-2">
        <span class="fw-bolder fs-7 text-white">{{ toast.type | uppercase }}</span>
        <span class="fw-semibold text-white opacity-75 fs-8">{{ toast.message }}</span>
    </div>
</div>
